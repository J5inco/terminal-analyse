name: Refresh Analyses J5

on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Declencher cron-refresh
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://terminal-analyse.vercel.app/api/cron-refresh)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ]; then
            echo "API request successful."
            exit 0
          else
            echo "API request failed with status $STATUS, but workflow continues."
          fi
