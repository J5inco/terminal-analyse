name: Manual Refresh / Collect

on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:
    inputs:
      endpoint:
        description: "cron-refresh ou cron-collect"
        required: true
        default: "cron-refresh"
      ticker:
        description: "Ticker optionnel (ex: AAPL)"
        required: false
        default: ""
      limit:
        description: "Nombre max de tickers"
        required: false
        default: "1"
      force:
        description: "Force refresh (true/false)"
        required: false
        default: "true"
      dry_run:
        description: "Dry run (true/false)"
        required: false
        default: "false"

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel endpoint
        run: |
          ENDPOINT="${{ github.event.inputs.endpoint || 'cron-refresh' }}"
          TICKER="${{ github.event.inputs.ticker || '' }}"
          LIMIT="${{ github.event.inputs.limit || '80' }}"
          FORCE="${{ github.event.inputs.force || 'true' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          URL="https://terminal-analyse.vercel.app/api/${ENDPOINT}?limit=${LIMIT}&force=${FORCE}&dryRun=${DRY_RUN}"
          if [ -n "$TICKER" ]; then
            URL="${URL}&ticker=${TICKER}"
          fi
          echo "Calling: $URL"
          STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$URL")
          echo "Status: $STATUS"
          echo "Body:"
          cat /tmp/resp.txt
          [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ] || exit 1
